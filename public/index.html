<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Web Terminal - Multi Session</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            height: 100%;
            background-color: #1a1a1a;
            overflow: hidden;
            font-family: 'Segoe UI', monospace;
        }
        
        /* Thanh tab */
        .tab-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 45px;
            background: #2d2d2d;
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 10px;
            overflow-x: auto;
            white-space: nowrap;
            z-index: 2000;
            border-bottom: 2px solid #00ff00;
        }
        
        .tab {
            background: #3d3d3d;
            color: #aaa;
            padding: 8px 20px;
            border-radius: 5px 5px 0 0;
            font-size: 14px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #555;
            border-bottom: none;
        }
        
        .tab.active {
            background: #00ff00;
            color: black;
            font-weight: bold;
            border-color: #00ff00;
        }
        
        .tab .close {
            color: #ff5555;
            font-weight: bold;
            padding: 0 8px;
            border-radius: 3px;
        }
        
        .tab .close:hover {
            background: #ff5555;
            color: white;
        }
        
        .add-tab {
            background: #00aa00;
            color: white;
            padding: 8px 20px;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            font-weight: bold;
        }
        
        .add-tab:hover {
            background: #00ff00;
            color: black;
        }
        
        /* User section */
        .user-section {
            position: fixed;
            top: 0;
            right: 15px;
            height: 45px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 2100;
        }
        
        #user-info {
            background: #27ae60;
            color: white;
            padding: 6px 15px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
        }
        
        #logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
        }
        
        #logout-btn:hover {
            background: #ff5555;
        }
        
        /* Terminal container */
        .terminal-wrapper {
            position: fixed;
            top: 45px;
            left: 0;
            right: 0;
            bottom: 280px;
            background: black;
        }
        
        .terminal-instance {
            width: 100%;
            height: 100%;
            display: none;
        }
        
        .terminal-instance.active {
            display: block;
        }
        
        /* Quick buttons cho nano - LUÔN HIỆN */
        .nano-buttons {
            position: fixed;
            bottom: 240px;
            left: 0;
            right: 0;
            background: #2d2d2d;
            padding: 12px;
            display: flex;
            justify-content: center;
            gap: 20px;
            border-top: 2px solid #00ff00;
            border-bottom: 2px solid #00ff00;
            z-index: 1900;
        }
        
        .nano-btn {
            background: #4d4d4d;
            color: white;
            border: 2px solid #00ff00;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            min-width: 120px;
        }
        
        .nano-btn:hover {
            background: #00ff00;
            color: black;
        }
        
        .nano-btn.save {
            background: #00aa00;
        }
        
        .nano-btn.exit {
            background: #aa5500;
        }
        
        .nano-btn.force {
            background: #aa0000;
        }
        
        /* Virtual keys - LUÔN HIỆN */
        .virtual-keys {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1a1a1a;
            border-top: 3px solid #00ff00;
            padding: 10px;
            z-index: 2000;
        }
        
        .key-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        
        .key-row:last-child {
            margin-bottom: 0;
        }
        
        .virtual-key {
            background: #333;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 12px 0;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            flex: 1;
            cursor: pointer;
            transition: all 0.1s;
        }
        
        .virtual-key:hover {
            background: #00ff00;
            color: black;
        }
        
        .virtual-key.special {
            background: #004400;
        }
        
        .virtual-key.wide {
            flex: 2;
        }
        
        /* Log panel */
        .log-panel {
            position: fixed;
            bottom: 240px;
            right: 20px;
            width: 350px;
            height: 200px;
            background: rgba(0,0,0,0.95);
            border: 2px solid #00ff00;
            border-radius: 5px;
            padding: 10px;
            color: #00ff00;
            font-size: 12px;
            overflow-y: auto;
            z-index: 1800;
            box-shadow: 0 0 20px rgba(0,255,0,0.3);
        }
        
        .log-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #00ff00;
            font-weight: bold;
        }
        
        #closeLogBtn {
            cursor: pointer;
            padding: 0 5px;
        }
        
        #closeLogBtn:hover {
            color: red;
        }
        
        #logContent {
            height: calc(100% - 30px);
            overflow-y: auto;
        }
        
        #logContent div {
            padding: 2px 0;
            border-bottom: 1px solid #333;
        }
        
        /* Loading */
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ff00;
            text-align: center;
            z-index: 3000;
            background: black;
            padding: 30px;
            border-radius: 10px;
            border: 2px solid #00ff00;
            font-size: 18px;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1e1e1e;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #00ff00;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div>⚡ WEB TERMINAL</div>
        <div style="margin-top: 20px; color: #666;">Đang kết nối...</div>
    </div>
    
    <!-- Thanh tab -->
    <div class="tab-bar" id="tabBar" style="display: none;">
        <div class="tabs-container" id="tabsContainer" style="display: flex; gap: 10px; flex: 1; overflow-x: auto;"></div>
        <button class="add-tab" id="addTabBtn">➕ Tab mới</button>
    </div>
    
    <!-- User section -->
    <div class="user-section" id="userSection" style="display: none;"></div>
    
    <!-- Terminal containers -->
    <div class="terminal-wrapper" id="terminalWrapper" style="display: none;"></div>
    
    <!-- Nút nano - LUÔN HIỆN -->
    <div class="nano-buttons" id="nanoButtons">
        <button class="nano-btn save" id="nanoSaveBtn">💾 Lưu (Ctrl+O)</button>
        <button class="nano-btn exit" id="nanoExitBtn">🚪 Thoát (Ctrl+X)</button>
        <button class="nano-btn force" id="nanoForceBtn">⚠️ Thoát không lưu</button>
    </div>
    
    <!-- Log panel -->
    <div class="log-panel" id="logPanel">
        <div class="log-header">
            <span>📋 LỊCH SỬ LỆNH</span>
            <span id="closeLogBtn">✖</span>
        </div>
        <div id="logContent"></div>
    </div>
    
    <!-- Virtual keys - LUÔN HIỆN -->
    <div class="virtual-keys" id="virtualKeys"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
    <script src="terminal.js"></script>
</body>
</html>
