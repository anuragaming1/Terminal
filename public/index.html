<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Web Terminal - Multi Session</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            height: 100%;
            background-color: #1a1a1a;
            overflow: hidden;
            font-family: 'Segoe UI', monospace;
        }
        
        /* Thanh tab - Cách xa logout */
        .tab-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 200px; /* Chừa chỗ cho user section */
            height: 50px;
            background: #2d2d2d;
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 10px;
            overflow-x: auto;
            white-space: nowrap;
            z-index: 2000;
            border-bottom: 2px solid #00ff00;
        }
        
        .tab {
            background: #3d3d3d;
            color: #aaa;
            padding: 8px 20px;
            border-radius: 5px 5px 0 0;
            font-size: 14px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #555;
            border-bottom: none;
            transition: all 0.2s;
        }
        
        .tab:hover {
            background: #4d4d4d;
            color: #fff;
        }
        
        .tab.active {
            background: #00ff00;
            color: black;
            font-weight: bold;
            border-color: #00ff00;
        }
        
        .tab .close {
            color: #ff5555;
            font-weight: bold;
            padding: 0 8px;
            border-radius: 3px;
            font-size: 16px;
        }
        
        .tab .close:hover {
            background: #ff5555;
            color: white;
        }
        
        .add-tab {
            background: #00aa00;
            color: white;
            padding: 8px 20px;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            font-weight: bold;
            white-space: nowrap;
        }
        
        .add-tab:hover {
            background: #00ff00;
            color: black;
        }
        
        /* User section - Cách xa bên phải */
        .user-section {
            position: fixed;
            top: 0;
            right: 0;
            width: 200px;
            height: 50px;
            background: #2d2d2d;
            border-bottom: 2px solid #00ff00;
            border-left: 2px solid #00ff00;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
            padding: 0 15px;
            z-index: 2100;
        }
        
        #user-info {
            background: #27ae60;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
        }
        
        #logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            font-weight: bold;
            white-space: nowrap;
        }
        
        #logout-btn:hover {
            background: #ff5555;
        }
        
        /* Terminal container */
        .terminal-wrapper {
            position: fixed;
            top: 50px;
            left: 0;
            right: 0;
            bottom: 320px; /* Tăng lên để chừa chỗ cho progress bar */
            background: black;
        }
        
        .terminal-instance {
            width: 100%;
            height: 100%;
            display: none;
        }
        
        .terminal-instance.active {
            display: block;
        }
        
        /* Progress bar cho pip install */
        .progress-bar-container {
            position: fixed;
            bottom: 280px;
            left: 0;
            right: 0;
            height: 40px;
            background: #2d2d2d;
            border-top: 2px solid #00ff00;
            border-bottom: 2px solid #00ff00;
            display: none;
            align-items: center;
            padding: 0 20px;
            z-index: 1850;
        }
        
        .progress-bar {
            flex: 1;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            margin: 0 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff00, #00aa00);
            width: 0%;
            transition: width 0.3s;
        }
        
        .progress-text {
            color: #00ff00;
            font-size: 12px;
            min-width: 100px;
            text-align: center;
        }
        
        .progress-status {
            color: #fff;
            font-size: 12px;
        }
        
        /* Quick buttons cho nano */
        .nano-buttons {
            position: fixed;
            bottom: 280px;
            left: 0;
            right: 0;
            background: #2d2d2d;
            padding: 12px;
            display: flex;
            justify-content: center;
            gap: 20px;
            border-top: 2px solid #00ff00;
            border-bottom: 2px solid #00ff00;
            z-index: 1900;
        }
        
        .nano-btn {
            background: #4d4d4d;
            color: white;
            border: 2px solid #00ff00;
            padding: 10px 25px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            min-width: 120px;
            transition: all 0.2s;
        }
        
        .nano-btn:hover {
            background: #00ff00;
            color: black;
            transform: scale(1.05);
        }
        
        .nano-btn.save {
            background: #00aa00;
        }
        
        .nano-btn.exit {
            background: #aa5500;
        }
        
        .nano-btn.force {
            background: #aa0000;
        }
        
        /* Virtual keys */
        .virtual-keys {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1a1a1a;
            border-top: 3px solid #00ff00;
            padding: 10px;
            z-index: 2000;
            max-height: 280px;
            overflow-y: auto;
        }
        
        .key-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        
        .key-row:last-child {
            margin-bottom: 0;
        }
        
        .virtual-key {
            background: #333;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 10px 0;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            flex: 1;
            cursor: pointer;
            transition: all 0.1s;
            user-select: none;
        }
        
        .virtual-key:hover {
            background: #00ff00;
            color: black;
            transform: scale(1.02);
        }
        
        .virtual-key:active {
            transform: scale(0.98);
        }
        
        .virtual-key.special {
            background: #004400;
        }
        
        .virtual-key.wide {
            flex: 2;
        }
        
        .virtual-key.install {
            background: #004488;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        
        /* Log panel */
        .log-panel {
            position: fixed;
            bottom: 320px;
            right: 20px;
            width: 400px;
            height: 250px;
            background: rgba(0,0,0,0.95);
            border: 2px solid #00ff00;
            border-radius: 5px;
            padding: 10px;
            color: #00ff00;
            font-size: 12px;
            overflow-y: auto;
            z-index: 1800;
            box-shadow: 0 0 20px rgba(0,255,0,0.3);
            backdrop-filter: blur(5px);
        }
        
        .log-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #00ff00;
            font-weight: bold;
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.95);
        }
        
        #closeLogBtn {
            cursor: pointer;
            padding: 0 5px;
            font-size: 16px;
        }
        
        #closeLogBtn:hover {
            color: red;
        }
        
        #logContent {
            height: calc(100% - 40px);
            overflow-y: auto;
        }
        
        #logContent div {
            padding: 3px 0;
            border-bottom: 1px solid #333;
            word-break: break-word;
        }
        
        /* Loading */
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ff00;
            text-align: center;
            z-index: 3000;
            background: black;
            padding: 30px;
            border-radius: 10px;
            border: 2px solid #00ff00;
            font-size: 18px;
            box-shadow: 0 0 30px rgba(0,255,0,0.3);
        }
        
        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #00ff00;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1e1e1e;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #00ff00;
            border-radius: 5px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #00aa00;
        }
        
        /* Tooltip */
        [data-tooltip] {
            position: relative;
        }
        
        [data-tooltip]:before {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #00ff00;
            color: black;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            white-space: nowrap;
            display: none;
            z-index: 3000;
        }
        
        [data-tooltip]:hover:before {
            display: block;
        }
        
        /* Mobile adjustments */
        @media (max-width: 768px) {
            .tab-bar {
                right: 150px;
            }
            
            .user-section {
                width: 150px;
            }
            
            .log-panel {
                width: 90%;
                right: 5%;
                font-size: 11px;
            }
            
            .virtual-key {
                padding: 8px 0;
                font-size: 11px;
            }
            
            .nano-btn {
                padding: 8px 15px;
                font-size: 12px;
                min-width: 80px;
            }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div>⚡ WEB TERMINAL</div>
        <div style="margin-top: 20px; color: #666; font-size: 14px;">Đang kết nối...</div>
    </div>
    
    <!-- Thanh tab -->
    <div class="tab-bar" id="tabBar" style="display: none;">
        <div class="tabs-container" id="tabsContainer" style="display: flex; gap: 10px; flex: 1; overflow-x: auto;"></div>
        <button class="add-tab" id="addTabBtn" data-tooltip="Thêm terminal mới">➕ Tab mới</button>
    </div>
    
    <!-- User section -->
    <div class="user-section" id="userSection" style="display: none;"></div>
    
    <!-- Terminal containers -->
    <div class="terminal-wrapper" id="terminalWrapper" style="display: none;"></div>
    
    <!-- Progress bar cho pip install -->
    <div class="progress-bar-container" id="progressBar">
        <span class="progress-status" id="progressStatus">📦 Đang cài đặt...</span>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="progress-text" id="progressText">0%</span>
    </div>
    
    <!-- Nút nano -->
    <div class="nano-buttons" id="nanoButtons">
        <button class="nano-btn save" id="nanoSaveBtn" data-tooltip="Ctrl+O để lưu">💾 Lưu (Ctrl+O)</button>
        <button class="nano-btn exit" id="nanoExitBtn" data-tooltip="Ctrl+X để thoát">🚪 Thoát (Ctrl+X)</button>
        <button class="nano-btn force" id="nanoForceBtn" data-tooltip="Thoát không lưu">⚠️ Thoát không lưu</button>
    </div>
    
    <!-- Log panel -->
    <div class="log-panel" id="logPanel">
        <div class="log-header">
            <span>📋 LỊCH SỬ LỆNH</span>
            <span id="closeLogBtn" data-tooltip="Đóng">✖</span>
        </div>
        <div id="logContent"></div>
    </div>
    
    <!-- Virtual keys -->
    <div class="virtual-keys" id="virtualKeys"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
    <script src="terminal.js"></script>
</body>
</html>
